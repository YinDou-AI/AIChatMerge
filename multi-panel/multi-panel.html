<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panelize - AI Comparison</title>
  <link rel="stylesheet" href="multi-panel.css">

  <!-- Material Symbols font -->
  <link rel="dns-prefetch" href="https://fonts.googleapis.com">
  <link rel="dns-prefetch" href="https://fonts.gstatic.com">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=block" rel="stylesheet">

  <!-- DNS prefetch and preconnect for faster loading -->
  <link rel="dns-prefetch" href="https://chat.deepseek.com">
  <link rel="dns-prefetch" href="https://www.doubao.com">
  <link rel="dns-prefetch" href="https://www.qianwen.com">
  <link rel="dns-prefetch" href="https://chatglm.cn">
  <link rel="dns-prefetch" href="https://yiyan.baidu.com">
  <link rel="dns-prefetch" href="https://metaso.cn">

  <link rel="preconnect" href="https://chat.deepseek.com">
  <link rel="preconnect" href="https://www.doubao.com">
  <link rel="preconnect" href="https://www.qianwen.com">
  <link rel="preconnect" href="https://chatglm.cn">
  <link rel="preconnect" href="https://yiyan.baidu.com">
  <link rel="preconnect" href="https://metaso.cn">
</head>
<body data-theme="auto">
  <div id="app">
    <!-- Panel Tab Bar -->
    <div id="panel-tab-bar">
      <div id="panel-tabs-container">
        <!-- 面板标签将由JS动态生成 -->
      </div>
      <button id="add-panel-btn" class="add-panel-tab-btn" title="添加面板">
        <span class="material-symbols-outlined">add</span>
      </button>
    </div>

    <!-- Main Content Area -->
    <div id="main-content">
      <button id="scroll-left-btn" class="panel-scroll-arrow panel-scroll-left" title="上一页">
        <span class="material-symbols-outlined">chevron_left</span>
      </button>
      <!-- Panel Grid Container -->
      <div id="panel-grid" class="layout-1x3">
        <!-- Panels will be dynamically generated -->
      </div>
      <button id="scroll-right-btn" class="panel-scroll-arrow panel-scroll-right" title="下一页">
        <span class="material-symbols-outlined">chevron_right</span>
      </button>
    </div>

    <!-- Bottom Input Bar -->
    <footer id="input-bar">
      <div class="input-container">
        <button id="prompt-library-btn" class="input-btn" title="提示词库">
          <span class="material-symbols-outlined">auto_awesome</span>
        </button>
        <button id="image-upload-btn" class="input-btn" title="上传图片">
          <span class="material-symbols-outlined">add_photo_alternate</span>
        </button>
        <input type="file" id="image-file-input" accept="image/*" multiple style="display: none;">
        <div class="input-wrapper">
          <div id="image-preview-container" class="image-preview-container"></div>
          <textarea id="unified-input" placeholder="输入你的问题，同时发送给所有AI..." rows="1"></textarea>
        </div>
        <div class="input-actions">
          <span id="send-status" class="send-status"></span>
          <!-- Send All Button -->
          <button id="send-all-btn" class="send-btn" title="发送给所有AI">
            <span class="material-symbols-outlined">send</span>
            <span class="btn-text">发送</span>
          </button>
          <!-- Copy All Answers Button -->
          <button id="copy-all-btn" class="copy-all-bottom-btn" title="复制所有回答">
            <span class="material-symbols-outlined">content_copy</span>
          </button>
          <!-- Merge Target AI Select -->
          <select id="merge-target-select" class="merge-select" title="融合目标 AI">
            <option value="deepseek">DeepSeek</option>
            <option value="kimi">Kimi</option>
            <option value="qianwen">千问</option>
            <option value="zhipu">智谱</option>
            <option value="wenxin">文心</option>
            <option value="doubao">豆包</option>
            <option value="metaso">秘塔</option>
          </select>
          <!-- Merge Button -->
          <button id="merge-btn" class="merge-btn" title="融合总结：收集所有回答并发送给目标 AI 对比">
            <span class="material-symbols-outlined">call_merge</span>
            <span class="btn-text">融合</span>
          </button>
          <!-- Toolbar action buttons (moved from header) -->
          <button id="new-chat-btn" class="bottom-action-btn" title="全部新建对话">
            <span class="material-symbols-outlined">add_comment</span>
          </button>
          <button id="layout-btn" class="bottom-action-btn" title="切换布局">
            <span class="material-symbols-outlined">grid_view</span>
          </button>
          <button id="toggle-open-mode-btn" class="bottom-action-btn" title="弹窗模式">
            <span class="material-symbols-outlined">open_in_new</span>
          </button>
          <button id="settings-btn" class="bottom-action-btn" title="设置">
            <span class="material-symbols-outlined">settings</span>
          </button>
        </div>
      </div>
    </footer>

    <!-- Layout Selector Modal -->
    <div id="layout-modal" class="modal" style="display: none;">
      <div class="modal-content modal-small">
        <div class="modal-header">
          <h3>选择布局</h3>
          <button class="close-btn" id="close-layout-modal">
            <span class="material-symbols-outlined">close</span>
          </button>
        </div>
        <div class="modal-body">
          <div class="layout-options">
            <button class="layout-option" data-layout="1x1" title="单面板">
              <div class="layout-preview layout-1x1-preview">
                <div></div>
              </div>
              <span>1x1</span>
            </button>
            <button class="layout-option" data-layout="1x2" title="两面板">
              <div class="layout-preview layout-1x2-preview">
                <div></div><div></div>
              </div>
              <span>1x2</span>
            </button>
            <button class="layout-option" data-layout="1x3" title="三面板">
              <div class="layout-preview layout-1x3-preview">
                <div></div><div></div><div></div>
              </div>
              <span>1x3</span>
            </button>
            <button class="layout-option" data-layout="1x4" title="四面板">
              <div class="layout-preview layout-1x4-preview">
                <div></div><div></div><div></div><div></div>
              </div>
              <span>1x4</span>
            </button>
            <button class="layout-option" data-layout="1x5" title="五面板">
              <div class="layout-preview layout-1x5-preview">
                <div></div><div></div><div></div><div></div><div></div>
              </div>
              <span>1x5</span>
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Prompt Library Modal -->
    <div id="prompt-modal" class="modal" style="display: none;">
      <div class="modal-content modal-large">
        <div class="modal-header">
          <h3>提示词库</h3>
          <div class="modal-header-actions">
            <button id="new-prompt-btn" class="header-action-btn" title="新建提示词">
              <span class="material-symbols-outlined">add</span>
            </button>
            <button class="close-btn" id="close-prompt-modal">
              <span class="material-symbols-outlined">close</span>
            </button>
          </div>
        </div>
        <div class="modal-body">
          <div class="prompt-filters">
            <div class="prompt-search-wrapper">
              <input type="text" id="prompt-search" placeholder="搜索提示词...">
            </div>
            <div class="prompt-filter-buttons">
              <select id="prompt-category-filter">
                <option value="">所有分类</option>
              </select>
              <button id="prompt-favorites-btn" class="filter-btn" title="仅显示收藏">
                <span class="material-symbols-outlined">star</span>
              </button>
              <button id="prompt-recent-btn" class="filter-btn active" title="最近使用">
                <span class="material-symbols-outlined">schedule</span>
              </button>
            </div>
          </div>
          <div id="prompt-list-modal">
            <!-- Prompts will be dynamically rendered -->
          </div>
        </div>
      </div>
    </div>

    <!-- Prompt Editor Modal (新增/编辑提示词) -->
    <div id="prompt-editor-modal" class="modal" style="display: none;">
      <div class="modal-content modal-large">
        <div class="modal-header">
          <h3 id="prompt-editor-title">新建提示词</h3>
          <button class="close-btn" id="close-prompt-editor">
            <span class="material-symbols-outlined">close</span>
          </button>
        </div>
        <div class="modal-body">
          <div class="form-group">
            <label for="prompt-title-input">标题</label>
            <input type="text" id="prompt-title-input" placeholder="输入提示词标题...">
          </div>
          <div class="form-group">
            <label for="prompt-content-input">内容</label>
            <textarea id="prompt-content-input" rows="8" placeholder="输入提示词内容... 使用 {variable} 作为变量"></textarea>
          </div>
          <div class="form-group">
            <label for="prompt-category-input">分类</label>
            <input type="text" id="prompt-category-input" placeholder="例如：写作、编程、调研">
          </div>
          <div class="form-group">
            <label for="prompt-tags-input">标签（逗号分隔）</label>
            <input type="text" id="prompt-tags-input" placeholder="例如：写作、创意、博客">
          </div>
        </div>
        <div class="modal-footer">
          <button id="delete-prompt-btn" class="btn-danger" style="margin-right: auto; display: none;">删除</button>
          <button id="cancel-prompt-editor" class="btn-secondary">取消</button>
          <button id="save-prompt-btn" class="btn-primary">保存</button>
        </div>
      </div>
    </div>

    <!-- Variable Input Modal -->
    <div id="variable-modal" class="modal" style="display: none;">
      <div class="modal-content modal-small">
        <div class="modal-header">
          <h3>填写变量</h3>
          <button class="close-btn" id="close-variable-modal">
            <span class="material-symbols-outlined">close</span>
          </button>
        </div>
        <div class="modal-body">
          <p class="variable-instruction">此提示词包含变量，请填写：</p>
          <div id="variable-inputs">
            <!-- Variable inputs will be dynamically generated -->
          </div>
        </div>
        <div class="modal-footer">
          <button id="cancel-variable-btn" class="btn-secondary">取消</button>
          <button id="apply-variable-btn" class="btn-primary">应用</button>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="multi-panel.js"></script>
</body>
</html>
